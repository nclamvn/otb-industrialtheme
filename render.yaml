databases:
  - name: dafc-otb-db
    plan: free
    databaseName: dafc_otb
    user: dafc
    region: singapore

services:
  # Backend API (NestJS)
  - type: web
    name: dafc-otb-api
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: node dist/src/main
    healthCheckPath: /api/v1/auth/login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dafc-otb-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://dafc-otb.onrender.com
      - key: NODE_ENV
        value: production

  # Frontend (Next.js)
  - type: web
    name: dafc-otb
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://dafc-otb-api.onrender.com/api/v1
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
